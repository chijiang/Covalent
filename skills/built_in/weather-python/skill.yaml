name: weather-python
version: "1.0.0"
description: Fetches current weather for any city using wttr.in
runtime:
  type: python
  protocol: callable
  entry_point: src/main.py
permissions:
  network:
    allow_outbound:
      - "wttr.in"
      - "*.wttr.in"
  filesystem: {}
  subprocess: false
process:
  max_instances: 2
  idle_timeout_seconds: 120
