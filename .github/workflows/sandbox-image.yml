name: sandbox-image

# Build and publish the covalent-sandbox image to GitHub Container Registry.
# Triggers only when the sandbox image or its baked-in runners change (plus a
# manual dispatch). Uses the default GITHUB_TOKEN — no extra secret needed.

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile.sandbox"
      - "src/agent_framework/skills/runners/**"
      - ".github/workflows/sandbox-image.yml"
  pull_request:
    paths:
      - "Dockerfile.sandbox"
      - "src/agent_framework/skills/runners/**"
      - ".github/workflows/sandbox-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/covalent-sandbox
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.sandbox
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
